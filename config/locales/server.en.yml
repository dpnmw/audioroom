en:
  site_settings:
    audioroom_enabled: "Enable the Audioroom voice rooms plugin."
    audioroom_sidebar_enabled: "Show voice rooms in the Discourse sidebar. Disable to use Audioroom as an API-only backend."
    audioroom_allowed_groups: "Groups that can access voice rooms."
    audioroom_create_room_allowed_groups: "Groups that can create new voice rooms."
    audioroom_max_rooms_per_user: "Maximum number of voice rooms a single user can own."
    audioroom_participant_ttl_seconds: "Seconds to keep active speaker presence in Redis before automatic cleanup. Client heartbeat refreshes every 10 seconds."
    audioroom_auto_status_enabled: "Automatically set user status when they join a voice room (e.g. '🎙️ In TheLounge'). Requires the 'enable user status' site setting."
    audioroom_badges_enabled: "Enable voice chat badges. Grants badges for voice room milestones like time spent, rooms visited, and connections made."
    audioroom_noise_suppression: "Enable DTLN-based noise suppression for voice rooms. When enabled, users can toggle noise suppression to filter background noise from their microphone audio."
    audioroom_idle_threshold_minutes: "Minutes of inactivity before a voice room participant is marked as idle. Set to 0 to disable."
    audioroom_afk_auto_mute_threshold_minutes: "Minutes of inactivity before a voice room participant is automatically muted. Set to 0 to disable."
    audioroom_afk_disconnect_threshold_minutes: "Minutes of inactivity before a voice room participant is automatically disconnected. Set to 0 to disable."
    audioroom_livekit_api_url: "Internal HTTP URL of the LiveKit server for the Room Service API (e.g. http://livekit:7880). Used for room create/delete. Configure LiveKit webhooks to POST to: https://yoursite.com/audioroom/webhook"
    audioroom_egress_url: "Internal URL of the LiveKit Egress container (e.g. http://egress:7788). Used for YouTube livestreaming."
  audioroom:
    notifications:
      room_live: "%{display_username} started %{room_name}"
    defaults:
      thelounge_description: "Join for casual drop-in voice chats with other community members."
    errors:
      not_enabled: "Audioroom voice rooms are disabled."
      not_authorized: "You are not allowed to perform that action for this room."
      room_full: "This room is full."
      kicked: "You have been removed from this room."
      banned: "You are permanently banned from this room."
      room_limit: "You reached the maximum number of rooms you can create."
      missing_payload: "Signal payload is required."
      cannot_kick_self: "You cannot kick yourself from the room."
      cannot_kick_creator: "You cannot kick the room creator."
      listeners_cannot_unmute: "Listeners cannot unmute in a Stage room."
      speakers_cannot_raise_hand: "Speakers and moderators cannot raise their hand."
      participant_not_found: "Participant is not in the room or has no audio track."
      already_in_room: "You are already in another voice room. Please leave it before joining a new one."
    livestream:
      already_live: "This room is already live."
      not_live: "This room is not currently live."
      missing_stream_key: "A YouTube stream key is required."
      start_failed: "Could not start the livestream. Check that Egress is running and configured correctly."
  badges:
    mic_check:
      name: "Mic Check"
      description: "Completed your first voice chat session."
      long_description: "Awarded after spending at least 30 seconds in a voice room with another person."
    rookie:
      name: "Rookie"
      description: "Spent 1 hour in voice chat."
      long_description: "Awarded for accumulating 1 hour of total voice time."
    chatterbox:
      name: "Chatterbox"
      description: "Spent 10 hours in voice chat."
      long_description: "Awarded for accumulating 10 hours of total voice time."
    silver_tongue:
      name: "Silver Tongue"
      description: "Spent 100 hours in voice chat."
      long_description: "Awarded for accumulating 100 hours of total voice time."
    icebreaker:
      name: "Icebreaker"
      description: "Joined a room full of strangers."
      long_description: "Awarded for joining a voice room where you had no prior co-presence history with anyone."
    social_butterfly:
      name: "Social Butterfly"
      description: "Chatted with 10 different people."
      long_description: "Awarded for achieving co-presence with 10 or more distinct users."
    life_of_the_party:
